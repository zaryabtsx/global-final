<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Map Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* body {
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    width: 100vw;
    min-height: 100vh;
  } */

  .map-wrapper {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .map-wrapper svg {
    width: 100%;
    max-width: none;
    height: auto;
    aspect-ratio: 1270 / 638;
    display: block;
  }

  /* ── Keyframes ── */
  @keyframes popReveal {
    0%   { opacity: 0; transform: scale(0.05) translateY(30px); filter: blur(6px); }
    60%  { opacity: 1; transform: scale(1.08) translateY(-6px); filter: blur(0px); }
    78%  { transform: scale(0.96) translateY(3px); }
    100% { opacity: 1; transform: scale(1)    translateY(0px);  filter: blur(0px); }
  }

  @keyframes floatCard {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-9px); }
  }

  /* Hidden by default */
  .fc1,.fc2,.fc3,.fc4,.fc5,.fc6 {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: bottom center;
  }

  /* Active — triggered by JS on scroll into view */
  .fc1.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s  infinite;
  }
  .fc2.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s infinite;
  }
  .fc3.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s infinite;
  }
  .fc4.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s infinite;
  }
  .fc5.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s infinite;
  }
  .fc6.active {
    animation:
      popReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0s both,
      floatCard 3s   ease-in-out                     0.9s infinite;
  }
</style>

<style>
  @media (max-width: 768px) {
    .map-wrapper {
      width: 100vw;
      overflow: hidden;
      padding: 0;
    }
    .map-wrapper svg {
      width: 100vw;
      max-width: 100vw;
      height: 100vw;
    }
  }
  @media (max-width: 320px) {
    .map-wrapper {
      width: 100vw;
      overflow: hidden;
      padding: 0;
    }
    .map-wrapper svg {
      width: 100vw;
      max-width: none;
      height: auto;
    }
  }
</style>

<script>
  (function () {
    var cards = ['fc1','fc2','fc3','fc4','fc5','fc6'];
    var section = document.getElementById('map-section');

    function startAnimation() {
      // Remove active from all to reset
      cards.forEach(function(c) {
        var els = section.querySelectorAll('.' + c);
        els.forEach(function(el) {
          el.classList.remove('active');
          // Force reflow so animation restarts cleanly
          void el.getBoundingClientRect();
        });
      });

      setTimeout(function() { addActiveClass('fc1'); }, 500);
      setTimeout(function() { addActiveClass('fc2'); }, 500);
      setTimeout(function() { addActiveClass('fc3'); }, 500);
      setTimeout(function() { addActiveClass('fc4'); }, 500);
      setTimeout(function() { addActiveClass('fc5'); }, 100);
      setTimeout(function() { addActiveClass('fc6'); }, 100);

      function addActiveClass(className) {
        var els = section.querySelectorAll('.' + className);
        els.forEach(function(el) {
          el.style.animation = 'none';
          void el.getBoundingClientRect();
          el.style.animation = '';
          el.classList.add('active');
        });
      }
    }

    function stopAnimation() {
      cards.forEach(function(c) {
        var els = section.querySelectorAll('.' + c);
        els.forEach(function(el) { el.classList.remove('active'); });
      });
    }

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          startAnimation();   // Came into view → play from start
        } else {
          stopAnimation();    // Left view → reset so it replays next time
        }
      });
    }, { threshold: 0.2 });

    observer.observe(section);
  })();
</script>
